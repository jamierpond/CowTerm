<!doctype html>
<!-- CowTerm web UI. Served embedded from the app (GET /); one tab is the
     pane of glass for the whole fleet: the serving CowTerm plus every peer
     in its "remotes" config, each over its own gateway websocket (discovery
     via that host's /api/v1/server, which is the one CORS-open endpoint).
     Terminal emulation is xterm.js — gateways ship raw PTY bytes, this page
     just plays them. Protocol: DESIGN-WEBUI.md in the repo. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>CowTerm</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  :root {
    --bg: #1a1b26; --panel: #16161e; --fg: #c0caf5; --dim: #565f89;
    --accent: #7aa2f7; --claude: #bb9af7; --border: #292e42;
    --ok: #9ece6a; --bad: #f7768e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; background: var(--bg);
    color: var(--fg); font: 13px/1.5 "JetBrains Mono", ui-monospace, monospace;
  }
  #sidebar {
    width: 280px; min-width: 280px; background: var(--panel);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 8px;
  }
  #sidebar h1 {
    font-size: 13px; margin: 4px 8px 10px; color: var(--dim);
    font-weight: normal; letter-spacing: 1px;
  }
  #sidebar h1 b { color: var(--fg); }
  .gateway { margin-bottom: 10px; }
  .gateway-name {
    padding: 3px 8px; font-size: 11px; color: var(--dim);
    text-transform: lowercase; letter-spacing: 0.5px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .gateway-name .dot { font-size: 9px; }
  .gateway-name .dot.on { color: var(--ok); }
  .gateway-name .dot.off { color: var(--bad); }
  .session { margin-bottom: 2px; }
  .session-name {
    padding: 3px 8px; color: var(--dim); cursor: pointer; border-radius: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-name:hover { background: var(--border); }
  .session.active .session-name { color: var(--fg); }
  .session-name .claude { color: var(--claude); }
  .pane {
    padding: 3px 8px 3px 20px; cursor: pointer; border-radius: 4px;
    color: var(--fg); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }
  .pane:hover { background: var(--border); }
  .pane.attached { background: var(--border); border-left: 2px solid var(--accent); }
  .pane .cwd { color: var(--dim); font-size: 11px; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #status {
    padding: 5px 12px; font-size: 11px; color: var(--dim);
    border-bottom: 1px solid var(--border); display: flex; gap: 12px;
  }
  #term-wrap { flex: 1; padding: 8px; overflow: auto; }
  #placeholder { color: var(--dim); padding: 40px; }
</style>
</head>
<body>
  <nav id="sidebar">
    <h1><b>cow</b>term</h1>
    <div id="gateways"></div>
  </nav>
  <main id="main">
    <div id="status">
      <span id="attached-label">pick a pane on the left</span>
    </div>
    <div id="term-wrap"><div id="placeholder"></div></div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script>
(() => {
  'use strict';

  if (typeof Terminal === 'undefined') {
    document.getElementById('placeholder').textContent =
      'xterm.js failed to load (offline?) — the web UI needs the CDN for now.';
    return;
  }

  const $ = id => document.getElementById(id);

  const theme = {
    background: '#1a1b26', foreground: '#c0caf5', cursor: '#c0caf5',
    selectionBackground: '#33467c',
    black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
    blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
    brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
    brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
    brightCyan: '#7dcfff', brightWhite: '#c0caf5',
  };

  // One Gateway per CowTerm instance: the serving one ("local", relative
  // URLs) plus each peer in its remotes list. Each keeps its own websocket
  // and rediscovers/redials on loss.
  const gateways = [];
  const attached = { gateway: null, pane: null };
  let term = null;

  function makeGateway(base, label) {
    return {
      base, label, ws: null, online: false, sessions: [], retryTimer: null,
    };
  }

  async function connectGateway(g) {
    let info;
    try {
      info = await (await fetch(g.base + '/api/v1/server')).json();
    } catch {
      return scheduleRetry(g);
    }

    // The serving instance's peer list seeds the fleet, once.
    if (g.label === 'local' && !gateways.seeded) {
      gateways.seeded = true;
      for (const address of info.remotes || []) {
        const remote = makeGateway('http://' + address, address.replace(/:2697$/, ''));
        gateways.push(remote);
        connectGateway(remote);
      }
    }

    const ws = new WebSocket(info.wsUrl);
    ws.binaryType = 'arraybuffer';
    g.ws = ws;

    ws.onopen = () => {
      g.online = true;
      render();

      if (attached.gateway === g && attached.pane)
        send(g, { op: 'attach', pane: attached.pane });
    };

    ws.onmessage = event => {
      if (typeof event.data === 'string')
        handleEvent(g, JSON.parse(event.data));
      else
        handleBinary(g, event.data);
    };

    ws.onclose = () => {
      g.online = false;
      g.ws = null;
      render();
      scheduleRetry(g);
    };
  }

  function scheduleRetry(g) {
    if (!g.retryTimer)
      g.retryTimer = setTimeout(() => {
        g.retryTimer = null;
        connectGateway(g);
      }, 2000);
  }

  function send(g, message) {
    if (g.ws && g.ws.readyState === WebSocket.OPEN)
      g.ws.send(JSON.stringify(message));
  }

  function handleEvent(g, message) {
    if (message.ev === 'sessions') {
      g.sessions = message.sessions || [];
      render();
    } else if (message.ev === 'attached') {
      if (attached.gateway === g && attached.pane === message.pane && term)
        term.resize(message.cols, message.rows);
    } else if (message.ev === 'exit') {
      if (attached.gateway === g && attached.pane === message.pane && term)
        term.write('\r\n\x1b[90m[shell exited]\x1b[0m\r\n');
    } else if (message.ev === 'error') {
      console.warn('cowterm[' + g.label + ']:', message.message);
    }
  }

  function handleBinary(g, buffer) {
    const bytes = new Uint8Array(buffer);
    const idLength = bytes[0];
    const id = new TextDecoder().decode(bytes.subarray(1, 1 + idLength));

    if (attached.gateway === g && attached.pane === id && term)
      term.write(bytes.subarray(1 + idLength));
  }

  function attach(g, pane) {
    if (attached.gateway && attached.pane
        && (attached.gateway !== g || attached.pane !== pane.id))
      send(attached.gateway, { op: 'detach', pane: attached.pane });

    attached.gateway = g;
    attached.pane = pane.id;
    $('attached-label').textContent = g.label + ' · ' + (pane.title || pane.id)
      + ' — ' + pane.cols + '×' + pane.rows;

    if (term) { term.dispose(); term = null; }
    $('term-wrap').textContent = '';

    // Each GUI owns its panes' sizes; mirror the owner exactly.
    term = new Terminal({
      cols: pane.cols, rows: pane.rows, theme,
      fontFamily: '"JetBrains Mono", ui-monospace, monospace',
      fontSize: 13, cursorBlink: true, allowProposedApi: true,
      scrollback: 5000,
    });
    term.open($('term-wrap'));
    term.onData(data => send(attached.gateway,
                             { op: 'input', pane: attached.pane, data }));
    term.focus();

    send(g, { op: 'attach', pane: pane.id });
    render();
  }

  function shortPath(p) {
    if (!p) return '';
    const parts = p.replace(/\/+$/, '').split('/');
    return parts[parts.length - 1] || p;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text ?? '';
    return div.innerHTML;
  }

  function render() {
    const root = $('gateways');
    root.textContent = '';

    for (const g of gateways) {
      const box = document.createElement('div');
      box.className = 'gateway';

      const name = document.createElement('div');
      name.className = 'gateway-name';
      name.innerHTML = escapeHtml(g.label)
        + ' <span class="dot ' + (g.online ? 'on' : 'off') + '">●</span>';
      box.appendChild(name);

      if (!g.online) {
        const off = document.createElement('div');
        off.className = 'pane';
        off.innerHTML = '<span class="cwd">offline — retrying…</span>';
        box.appendChild(off);
      }

      for (const session of g.sessions) {
        const sbox = document.createElement('div');
        sbox.className = 'session' + (session.active ? ' active' : '');

        const sname = document.createElement('div');
        sname.className = 'session-name';
        sname.innerHTML = (session.claude ? '<span class="claude">✳ </span>' : '')
          + escapeHtml(session.name);
        sname.title = session.projectDir || session.name;
        sname.onclick = () => send(g, { op: 'activate', key: session.key });
        sbox.appendChild(sname);

        for (const pane of session.panes || []) {
          const row = document.createElement('div');
          const isAttached = attached.gateway === g && attached.pane === pane.id;
          row.className = 'pane' + (isAttached ? ' attached' : '');
          const title = pane.title || shortPath(pane.cwd) || pane.id.slice(0, 8);
          row.innerHTML = escapeHtml(title)
            + ' <span class="cwd">' + escapeHtml(shortPath(pane.cwd)) + '</span>';
          row.onclick = () => attach(g, pane);
          sbox.appendChild(row);
        }

        box.appendChild(sbox);
      }

      root.appendChild(box);
    }
  }

  const local = makeGateway('', 'local');
  gateways.push(local);
  connectGateway(local);
})();
</script>
</body>
</html>
