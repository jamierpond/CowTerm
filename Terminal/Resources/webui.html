<!doctype html>
<!-- CowTerm web UI: a real mux client, not a pane viewer. One tab shows a
     whole session — the full split tree, every pane live at once, laid out
     with the owning GUI's geometry — across the serving CowTerm and every
     peer in its "remotes" config, each fleet member on its own gateway
     websocket. Cmd/Ctrl+K opens the session palette (fuzzy search across
     the fleet); switching sessions is per-client and never touches the
     host GUI — "focus on host" does that explicitly. Terminal emulation is
     xterm.js; gateways ship raw PTY bytes. Protocol: DESIGN-WEBUI.md. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>CowTerm</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  :root {
    --bg: #1a1b26; --panel: #16161e; --fg: #c0caf5; --dim: #565f89;
    --accent: #7aa2f7; --claude: #bb9af7; --border: #292e42;
    --ok: #9ece6a; --bad: #f7768e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; background: var(--bg);
    color: var(--fg); font: 13px/1.5 "JetBrains Mono", ui-monospace, monospace;
  }
  #sidebar {
    width: 250px; min-width: 250px; background: var(--panel);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 8px;
  }
  #sidebar h1 {
    font-size: 13px; margin: 4px 8px 10px; color: var(--dim);
    font-weight: normal; letter-spacing: 1px;
  }
  #sidebar h1 b { color: var(--fg); }
  #sidebar h1 .hint { float: right; font-size: 10px; }
  .gateway { margin-bottom: 10px; }
  .gateway-name {
    padding: 3px 8px; font-size: 11px; color: var(--dim);
    display: flex; justify-content: space-between; align-items: center;
  }
  .gateway-name .dot { font-size: 9px; }
  .gateway-name .dot.on { color: var(--ok); }
  .gateway-name .dot.off { color: var(--bad); }
  .session-name {
    padding: 3px 8px; color: var(--dim); cursor: pointer; border-radius: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-name:hover { background: var(--border); }
  .session-name.viewed { background: var(--border); color: var(--fg);
    border-left: 2px solid var(--accent); }
  .session-name .claude { color: var(--claude); }
  .session-name .count { color: var(--dim); font-size: 11px; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #status {
    padding: 5px 12px; font-size: 11px; color: var(--dim);
    border-bottom: 1px solid var(--border); display: flex; gap: 14px;
    align-items: center;
  }
  #status .name { color: var(--fg); }
  #status button {
    background: none; border: 1px solid var(--border); color: var(--dim);
    font: inherit; border-radius: 4px; padding: 1px 8px; cursor: pointer;
  }
  #status button:hover { color: var(--fg); border-color: var(--dim); }
  #view { flex: 1; min-height: 0; padding: 4px; position: relative; }
  /* Zoom overlays the focused leaf on the whole view, so it works at any
     nesting depth rather than depending on the tree's shape. */
  #view.zoomed .leaf:not(.focused) { visibility: hidden; }
  #view.zoomed .leaf.focused { position: absolute; inset: 0; z-index: 2; }
  #popup {
    display: none; position: absolute; inset: 10px; z-index: 5;
    background: var(--bg); border: 1px solid var(--accent); border-radius: 6px;
  }
  #popup.open { display: block; }
  #popup .xt { position: absolute; inset: 4px; }
  #leader {
    display: none; position: fixed; bottom: 10px; left: 50%;
    transform: translateX(-50%); background: var(--panel); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 5px; padding: 3px 12px;
    font-size: 11px; z-index: 20;
  }
  #leader.on { display: block; }
  #placeholder { color: var(--dim); padding: 40px; }
  .split { display: flex; width: 100%; height: 100%; gap: 2px; }
  .split.h { flex-direction: row; }
  .split.v { flex-direction: column; }
  .leaf {
    overflow: hidden; position: relative; border: 1px solid var(--border);
    border-radius: 3px; background: var(--bg); min-width: 0; min-height: 0;
  }
  .leaf.focused { border-color: var(--accent); }
  .leaf .xt { position: absolute; inset: 2px; }
  #palette {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 10;
  }
  #palette.open { display: block; }
  #palette-box {
    width: min(560px, 90vw); margin: 12vh auto 0; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  #palette-input {
    width: 100%; background: none; border: none; outline: none;
    color: var(--fg); font: 14px "JetBrains Mono", monospace; padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .palette-row { padding: 7px 14px; cursor: pointer; display: flex; gap: 10px; }
  .palette-row.sel { background: var(--border); }
  .palette-row .host { color: var(--dim); font-size: 11px; margin-left: auto; }
</style>
</head>
<body>
  <nav id="sidebar">
    <h1><b>cow</b>term <span class="hint">⌘K search</span></h1>
    <div id="gateways"></div>
  </nav>
  <main id="main">
    <div id="status">
      <span id="viewed-label">no session — ⌘K to pick one</span>
      <button id="host-focus" style="display:none">focus on host</button>
    </div>
    <div id="view"><div id="placeholder"></div></div>
    <div id="popup"></div>
  </main>
  <div id="leader">Ctrl+A —  " % split · x close · z zoom · hjkl focus · o cycle · HJKL resize · i lazygit · c new · f find</div>
  <div id="palette">
    <div id="palette-box">
      <input id="palette-input" placeholder="search sessions across the fleet…"
             autocomplete="off" spellcheck="false">
      <div id="palette-list"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script>
(() => {
  'use strict';

  if (typeof Terminal === 'undefined') {
    document.getElementById('placeholder').textContent =
      'xterm.js failed to load (offline?) — the web UI needs the CDN for now.';
    return;
  }

  const $ = id => document.getElementById(id);

  const theme = {
    background: '#1a1b26', foreground: '#c0caf5', cursor: '#c0caf5',
    selectionBackground: '#33467c',
    black: '#15161e', red: '#f7768e', green: '#9ece6a', yellow: '#e0af68',
    blue: '#7aa2f7', magenta: '#bb9af7', cyan: '#7dcfff', white: '#a9b1d6',
    brightBlack: '#414868', brightRed: '#f7768e', brightGreen: '#9ece6a',
    brightYellow: '#e0af68', brightBlue: '#7aa2f7', brightMagenta: '#bb9af7',
    brightCyan: '#7dcfff', brightWhite: '#c0caf5',
  };

  // The fleet: one Gateway per CowTerm — the serving instance ("local",
  // relative URLs) plus each peer its config names.
  const gateways = [];
  // What THIS client is looking at; other clients (and the host GUI) are
  // free to look elsewhere.
  const view = { g: null, key: null, layoutSig: '' };
  // Live terminals for the viewed session, keyed by pane id.
  const terms = new Map();
  let focusedPane = null;
  let zoomed = false;
  let pendingView = null;
  // The Ctrl+A popup: an ephemeral pane running on the serving machine.
  const popup = { pane: null, term: null, g: null };

  const makeGateway = (base, label) =>
    ({ base, label, ws: null, online: false, sessions: [], retryTimer: null });

  // Cell metrics, measured once from the real font, so a popup can ask the
  // remote for a grid that actually fits the box we will draw it in.
  const cell = (() => {
    const probe = document.createElement('div');
    probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;'
      + 'font:13px "JetBrains Mono", ui-monospace, monospace';
    probe.textContent = 'W'.repeat(100);
    document.body.appendChild(probe);
    const w = probe.getBoundingClientRect().width / 100;
    const h = probe.getBoundingClientRect().height;
    probe.remove();
    return { w: w || 7.8, h: (h || 17) * 1.2 };
  })();

  async function connectGateway(g) {
    let info;
    try {
      info = await (await fetch(g.base + '/api/v1/server')).json();
    } catch {
      return scheduleRetry(g);
    }

    if (g.label === 'local' && !gateways.seeded) {
      gateways.seeded = true;
      for (const address of info.remotes || []) {
        const remote = makeGateway('http://' + address, address.replace(/:2697$/, ''));
        gateways.push(remote);
        connectGateway(remote);
      }
    }

    const ws = new WebSocket(info.wsUrl);
    ws.binaryType = 'arraybuffer';
    g.ws = ws;

    ws.onopen = () => {
      g.online = true;
      renderSidebar();

      // Resume the viewed session's streams after an outage.
      if (view.g === g)
        for (const paneId of terms.keys())
          send(g, { op: 'attach', pane: paneId });
    };

    ws.onmessage = event => {
      if (typeof event.data === 'string')
        handleEvent(g, JSON.parse(event.data));
      else
        handleBinary(g, event.data);
    };

    ws.onclose = () => {
      g.online = false;
      g.ws = null;
      renderSidebar();
      scheduleRetry(g);
    };
  }

  function scheduleRetry(g) {
    if (!g.retryTimer)
      g.retryTimer = setTimeout(() => {
        g.retryTimer = null;
        connectGateway(g);
      }, 2000);
  }

  function send(g, message) {
    if (g.ws && g.ws.readyState === WebSocket.OPEN)
      g.ws.send(JSON.stringify(message));
  }

  function findSession(g, key) {
    return g.sessions.find(s => s.key === key) || null;
  }

  function handleEvent(g, message) {
    if (message.ev === 'sessions') {
      g.sessions = message.sessions || [];
      renderSidebar();

      if (pendingView && pendingView.g === g
          && findSession(g, pendingView.key)) {
        const target = pendingView;
        pendingView = null;
        viewSession(target.g, target.key);
        return;
      }

      if (view.g === g) {
        const session = findSession(g, view.key);

        if (!session) {
          clearView('session closed on ' + g.label);
        } else if (layoutSignature(session) !== view.layoutSig) {
          buildView(); // splits changed shape or size — rebuild the tree
        } else {
          $('viewed-label').innerHTML = viewedLabel(session);
        }
      }

      // First roster from the local gateway: land on its active session.
      if (!view.g && g.label === 'local' && g.sessions.length)
        viewSession(g, (g.sessions.find(s => s.active) || g.sessions[0]).key);
    } else if (message.ev === 'attached') {
      if (popup.pane === message.pane && popup.term) {
        popup.term.resize(message.cols, message.rows);
        return;
      }

      const entry = view.g === g ? terms.get(message.pane) : null;
      if (entry)
        entry.term.resize(message.cols, message.rows);
    } else if (message.ev === 'popup') {
      showPopupPane(g, message.pane);
    } else if (message.ev === 'opened') {
      // The roster push is coalesced and therefore still in flight; view
      // the new session once it actually appears.
      pendingView = { g, key: message.key };
    } else if (message.ev === 'exit') {
      if (popup.pane === message.pane) {
        // The command ended (quitting lazygit), so the popup goes away.
        popup.term.dispose();
        popup.term = null;
        popup.pane = null;
        popup.g = null;
        $('popup').classList.remove('open');
        $('popup').textContent = '';
        const entry = terms.get(focusedPane);
        if (entry) entry.term.focus();
        return;
      }

      const entry = view.g === g ? terms.get(message.pane) : null;
      if (entry)
        entry.term.write('\r\n\x1b[90m[shell exited]\x1b[0m\r\n');
    } else if (message.ev === 'error') {
      console.warn('cowterm[' + g.label + ']:', message.message);
    }
  }

  function showPopupPane(g, paneId) {
    popup.pane = paneId;
    popup.g = g;

    const box = $('popup');
    box.textContent = '';
    box.classList.add('open');

    const el = document.createElement('div');
    el.className = 'xt';
    box.appendChild(el);

    const rect = box.getBoundingClientRect();
    popup.term = new Terminal({
      cols: Math.max(20, Math.floor((rect.width - 8) / cell.w)),
      rows: Math.max(5, Math.floor((rect.height - 8) / cell.h)),
      theme, fontFamily: '"JetBrains Mono", ui-monospace, monospace',
      fontSize: 13, cursorBlink: true, allowProposedApi: true,
    });
    popup.term.open(el);
    popup.term.onData(data => send(g, { op: 'input', pane: paneId, data }));
    popup.term.attachCustomKeyEventHandler(leaderHandler);
    popup.term.focus();

    send(g, { op: 'attach', pane: paneId });
  }

  function handleBinary(g, buffer) {
    const bytes = new Uint8Array(buffer);
    const idLength = bytes[0];
    const id = new TextDecoder().decode(bytes.subarray(1, 1 + idLength));

    if (popup.pane === id && popup.term) {
      popup.term.write(bytes.subarray(1 + idLength));
      return;
    }

    if (view.g !== g)
      return;

    const entry = terms.get(id);

    if (entry)
      entry.term.write(bytes.subarray(1 + idLength));
  }

  // The whole point: switching sessions is a CLIENT act. Each tab muxes
  // its own choice of session; the host GUI never moves underneath you.
  function viewSession(g, key) {
    if (view.g === g && view.key === key)
      return;

    detachAll();
    zoomed = false;
    $('view').classList.remove('zoomed');
    view.g = g;
    view.key = key;
    buildView();
  }

  function detachAll() {
    if (view.g)
      for (const paneId of terms.keys())
        send(view.g, { op: 'detach', pane: paneId });

    for (const entry of terms.values())
      entry.term.dispose();

    terms.clear();
    focusedPane = null;
  }

  function clearView(message) {
    detachAll();
    view.g = null;
    view.key = null;
    view.layoutSig = '';
    $('view').innerHTML = '<div id="placeholder">' + escapeHtml(message) + '</div>';
    $('viewed-label').textContent = 'no session — ⌘K to pick one';
    $('host-focus').style.display = 'none';
    renderSidebar();
  }

  const layoutSignature = session => JSON.stringify([
    session.layout, session.panes.map(p => [p.id, p.cols, p.rows]),
  ]);

  function viewedLabel(session) {
    return '<span class="name">' + escapeHtml(session.name) + '</span> · '
      + escapeHtml(view.g.label) + ' · ' + session.panes.length
      + (session.panes.length === 1 ? ' pane' : ' panes');
  }

  // Rebuild the split tree for the viewed session. Terminals for panes
  // that survived the reshape are reused (no re-snapshot flicker); only
  // new panes attach fresh.
  function buildView() {
    const session = findSession(view.g, view.key);

    if (!session || !session.layout.length) {
      clearView('nothing to show');
      return;
    }

    view.layoutSig = layoutSignature(session);
    const surviving = new Set(session.panes.map(p => p.id));

    for (const [paneId, entry] of [...terms]) {
      if (!surviving.has(paneId)) {
        send(view.g, { op: 'detach', pane: paneId });
        entry.term.dispose();
        terms.delete(paneId);
      } else {
        entry.el.remove(); // keep the terminal, re-home its element below
      }
    }

    const root = $('view');
    root.innerHTML = '';
    root.appendChild(buildNode(session, 0));

    if (!focusedPane || !surviving.has(focusedPane))
      focusedPane = (session.panes.find(p => p.active) || session.panes[0]).id;

    const focused = terms.get(focusedPane);
    if (focused)
      focused.term.focus();

    $('viewed-label').innerHTML = viewedLabel(session);
    $('host-focus').style.display = '';
    renderSidebar();
  }

  function buildNode(session, index) {
    const node = session.layout[index];

    if (node.split) {
      const box = document.createElement('div');
      box.className = 'split ' + (node.horizontal ? 'h' : 'v');

      const first = buildNode(session, node.first);
      const second = buildNode(session, node.second);
      first.style.flex = String(node.ratio);
      second.style.flex = String(1 - node.ratio);
      box.appendChild(first);
      box.appendChild(second);
      return box;
    }

    const pane = session.panes.find(p => p.id === node.pane)
                 || { id: node.pane, cols: 80, rows: 24 };
    const leaf = document.createElement('div');
    leaf.className = 'leaf' + (pane.id === focusedPane ? ' focused' : '');
    leaf.dataset.pane = pane.id;

    let entry = terms.get(pane.id);

    if (!entry) {
      // Mirror the owner's grid exactly; the box crops or letterboxes.
      const term = new Terminal({
        cols: pane.cols, rows: pane.rows, theme,
        fontFamily: '"JetBrains Mono", ui-monospace, monospace',
        fontSize: 13, cursorBlink: true, allowProposedApi: true,
        scrollback: 5000,
      });
      const el = document.createElement('div');
      el.className = 'xt';
      term.onData(data =>
        send(view.g, { op: 'input', pane: pane.id, data }));
      term.attachCustomKeyEventHandler(leaderHandler);
      entry = { term, el, opened: false };
      terms.set(pane.id, entry);
      send(view.g, { op: 'attach', pane: pane.id });
    } else if (entry.term.cols !== pane.cols || entry.term.rows !== pane.rows) {
      // Owner resized: follow along; full-screen apps repaint themselves
      // over the stream after the owner's WINCH.
      entry.term.resize(pane.cols, pane.rows);
    }

    leaf.appendChild(entry.el);

    if (!entry.opened) {
      entry.term.open(entry.el);
      entry.opened = true;
    }

    leaf.addEventListener('mousedown', () => setFocus(pane.id));
    entry.el.addEventListener('focusin', () => setFocus(pane.id));
    return leaf;
  }

  // ---- the leader table (Ctrl+A), mirroring the native one ----
  //
  // Shape commands (splits, close, resize) travel to the CowTerm that owns
  // the pane tree, exactly as they do from a native mirror. View commands
  // (focus, zoom) stay here, because every viewer gets its own answer.

  let leaderArmed = false;

  function armLeader(on) {
    leaderArmed = on;
    $('leader').classList.toggle('on', on);
  }

  const sendCommand = (name, cells) =>
    send(view.g, { op: 'command', pane: focusedPane, command: name,
                   cells: cells || 1 });

  // Nearest leaf whose centre lies in the given direction — the geometric
  // pick the native focusDirection makes.
  function focusDirection(dir) {
    const leaves = [...document.querySelectorAll('.leaf')];
    const from = leaves.find(l => l.dataset.pane === focusedPane);
    if (!from) return;

    const a = from.getBoundingClientRect();
    const ax = a.left + a.width / 2, ay = a.top + a.height / 2;
    let best = null, bestDist = Infinity;

    for (const leaf of leaves) {
      if (leaf === from) continue;
      const b = leaf.getBoundingClientRect();
      const bx = b.left + b.width / 2, by = b.top + b.height / 2;
      const dx = bx - ax, dy = by - ay;

      const ok = dir === 'h' ? dx < -1 : dir === 'l' ? dx > 1
               : dir === 'k' ? dy < -1 : dy > 1;
      if (!ok) continue;

      const dist = Math.abs(dx) + Math.abs(dy);
      if (dist < bestDist) { bestDist = dist; best = leaf; }
    }

    if (best) setFocus(best.dataset.pane);
  }

  function cycleFocus() {
    const leaves = [...document.querySelectorAll('.leaf')];
    if (leaves.length < 2) return;
    const at = leaves.findIndex(l => l.dataset.pane === focusedPane);
    setFocus(leaves[(at + 1) % leaves.length].dataset.pane);
  }

  function toggleZoom() {
    zoomed = !zoomed;
    $('view').classList.toggle('zoomed', zoomed);
  }

  function openPopup(command) {
    if (popup.pane || !view.g || !focusedPane) return;

    const box = $('popup').getBoundingClientRect();
    const cols = Math.max(20, Math.floor((box.width - 8) / cell.w));
    const rows = Math.max(5, Math.floor((box.height - 8) / cell.h));

    popup.g = view.g;
    send(view.g, { op: 'popup', pane: focusedPane, data: command,
                   cols, rows });
  }

  function closePopup() {
    if (!popup.pane) return;

    // Detaching is what ends it over there — it exists only for us.
    send(popup.g, { op: 'detach', pane: popup.pane });
    popup.term.dispose();
    popup.term = null;
    popup.pane = null;
    popup.g = null;
    $('popup').classList.remove('open');
    $('popup').textContent = '';

    const entry = terms.get(focusedPane);
    if (entry) entry.term.focus();
  }

  // Runs for every terminal, popup included. Returning false keeps the key
  // away from the shell.
  function leaderHandler(event) {
    if (event.type !== 'keydown') return true;

    if (leaderArmed) {
      armLeader(false);

      // Prefix twice sends a literal Ctrl+A through to the shell.
      if (event.ctrlKey && event.key.toLowerCase() === 'a') return true;

      handleLeaderKey(event.key);
      return false;
    }

    if (event.ctrlKey && !event.metaKey && event.key.toLowerCase() === 'a') {
      armLeader(true);
      return false;
    }

    return true;
  }

  function handleLeaderKey(key) {
    // While a popup is up, the leader either dismisses it or is swallowed:
    // the rest of the table targets panes the user cannot see.
    if (popup.pane) {
      if (key === 'i') closePopup();
      return;
    }

    switch (key) {
      case '"': sendCommand('split-below'); break;
      case '%': sendCommand('split-beside'); break;
      case 'x': sendCommand('close-pane'); break;
      case 'H': sendCommand('resize-left'); break;
      case 'J': sendCommand('resize-down'); break;
      case 'K': sendCommand('resize-up'); break;
      case 'L': sendCommand('resize-right'); break;
      case 'z': toggleZoom(); break;
      case 'o': cycleFocus(); break;
      case 'h': case 'ArrowLeft': focusDirection('h'); break;
      case 'j': case 'ArrowDown': focusDirection('j'); break;
      case 'k': case 'ArrowUp': focusDirection('k'); break;
      case 'l': case 'ArrowRight': focusDirection('l'); break;
      case 'i': openPopup('lazygit'); break;
      case 'f': case 'w': openPalette(); break;
      case 'c': {
        const session = findSession(view.g, view.key);
        const pane = session && session.panes.find(p => p.id === focusedPane);
        if (pane) send(view.g, { op: 'open', dir: pane.cwd });
        break;
      }
      default: break; // unknown leader keys are swallowed, as natively
    }
  }

  function setFocus(paneId) {
    if (focusedPane === paneId)
      return;

    focusedPane = paneId;

    for (const leaf of document.querySelectorAll('.leaf'))
      leaf.classList.toggle('focused', leaf.dataset.pane === paneId);

    const entry = terms.get(paneId);
    if (entry)
      entry.term.focus();
  }

  // ---- sidebar ----

  function shortPath(p) {
    if (!p) return '';
    const parts = p.replace(/\/+$/, '').split('/');
    return parts[parts.length - 1] || p;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text ?? '';
    return div.innerHTML;
  }

  function renderSidebar() {
    const root = $('gateways');
    root.textContent = '';

    for (const g of gateways) {
      const box = document.createElement('div');
      box.className = 'gateway';

      const name = document.createElement('div');
      name.className = 'gateway-name';
      name.innerHTML = escapeHtml(g.label)
        + ' <span class="dot ' + (g.online ? 'on' : 'off') + '">●</span>';
      box.appendChild(name);

      for (const session of g.sessions) {
        const row = document.createElement('div');
        const viewed = view.g === g && view.key === session.key;
        row.className = 'session-name' + (viewed ? ' viewed' : '');
        row.innerHTML = (session.claude ? '<span class="claude">✳ </span>' : '')
          + escapeHtml(session.name)
          + ' <span class="count">' + session.panes.length + '</span>';
        row.title = session.projectDir || session.name;
        row.onclick = () => viewSession(g, session.key);
        box.appendChild(row);
      }

      root.appendChild(box);
    }
  }

  // ---- session palette (⌘K / Ctrl+K): fuzzy search across the fleet ----

  let paletteSel = 0;

  const fuzzyScore = (needle, hay) => {
    needle = needle.toLowerCase();
    hay = hay.toLowerCase();
    let score = 0, h = 0;
    for (const c of needle) {
      const at = hay.indexOf(c, h);
      if (at < 0) return -1;
      score += (at === h ? 2 : 1); // consecutive runs score higher
      h = at + 1;
    }
    return score;
  };

  function paletteMatches() {
    const query = $('palette-input').value.trim();
    const out = [];

    for (const g of gateways)
      for (const session of g.sessions) {
        const hay = session.name + ' ' + (session.projectDir || '') + ' ' + g.label;
        const score = query ? fuzzyScore(query, hay) : 0;
        if (score >= 0)
          out.push({ g, session, score });
      }

    out.sort((a, b) => b.score - a.score);
    return out.slice(0, 12);
  }

  function renderPalette() {
    const list = $('palette-list');
    const matches = paletteMatches();
    paletteSel = Math.min(paletteSel, Math.max(matches.length - 1, 0));
    list.textContent = '';

    matches.forEach((m, i) => {
      const row = document.createElement('div');
      row.className = 'palette-row' + (i === paletteSel ? ' sel' : '');
      row.innerHTML = (m.session.claude ? '<span class="claude">✳</span>' : '')
        + escapeHtml(m.session.name)
        + '<span class="host">' + escapeHtml(m.g.label) + '</span>';
      row.onmousedown = e => {
        e.preventDefault();
        closePalette();
        viewSession(m.g, m.session.key);
      };
      list.appendChild(row);
    });

    list.dataset.count = matches.length;
    return matches;
  }

  function openPalette() {
    $('palette').classList.add('open');
    $('palette-input').value = '';
    paletteSel = 0;
    renderPalette();
    $('palette-input').focus();
  }

  function closePalette() {
    $('palette').classList.remove('open');
    const entry = terms.get(focusedPane);
    if (entry)
      entry.term.focus();
  }

  $('palette-input').addEventListener('input', () => {
    paletteSel = 0;
    renderPalette();
  });

  $('palette-input').addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePalette(); }
    else if (e.key === 'ArrowDown') { paletteSel++; renderPalette(); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { paletteSel = Math.max(0, paletteSel - 1); renderPalette(); e.preventDefault(); }
    else if (e.key === 'Enter') {
      const matches = paletteMatches();
      const m = matches[paletteSel];
      if (m) { closePalette(); viewSession(m.g, m.session.key); }
    }
  });

  $('palette').addEventListener('mousedown', e => {
    if (e.target === $('palette'))
      closePalette();
  });

  // Capture-phase so the shortcut wins even while an xterm owns the keys.
  window.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      e.stopPropagation();
      if ($('palette').classList.contains('open')) closePalette();
      else openPalette();
    }
  }, true);

  // "focus on host": the one deliberate way a client reaches into the
  // host GUI — makes the viewed session active over there too.
  $('host-focus').onclick = () => {
    if (view.g && view.key)
      send(view.g, { op: 'activate', key: view.key });
  };

  const local = makeGateway('', 'local');
  gateways.push(local);
  connectGateway(local);
})();
</script>
</body>
</html>
